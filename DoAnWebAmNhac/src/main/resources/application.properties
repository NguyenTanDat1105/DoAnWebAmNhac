spring.application.name=DoAnWebAmNhac
# 1. Cổng chạy ứng dụng (Mặc định 8080)
server.port=8080

# 2. Cấu hình MySQL (XAMPP mặc định user là root và không có password)
spring.datasource.url=jdbc:mysql://localhost:3306/QLWebAmNhac?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

# 3. Cấu hình JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 4. Tắt cache của Thymeleaf để khi bạn sửa HTML/CSS thì trình duyệt cập nhật ngay
spring.thymeleaf.cache=false

# Ép Spring Boot sử dụng chính xác tên cột đã khai báo, không tự động thêm dấu gạch dưới (_)
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
