<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chỉnh Sửa Bài Hát - Muse Zone</title>
    <style>
        body { background-color: #121212; color: white; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; }
        .form-container { max-width: 550px; margin: 50px auto; background: #181818; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 1px solid #282828; }
        h2 { color: #1DB954; margin-top: 0; text-align: center; letter-spacing: 1px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-size: 14px; color: #b3b3b3; }
        .form-control { width: 100%; background: #282828; border: 1px solid #444; border-radius: 6px; color: white; padding: 10px 12px; font-size: 14px; box-sizing: border-box; }
        .form-control:focus { outline: none; border-color: #1DB954; }
        .btn-submit { width: 100%; background: #1DB954; color: white; border: none; padding: 12px; border-radius: 25px; font-weight: bold; font-size: 15px; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .btn-submit:hover { background: #1ed760; transform: scale(1.01); }
        .btn-cancel { display: block; text-align: center; color: #b3b3b3; text-decoration: none; font-size: 13px; margin-top: 15px; }
        .btn-cancel:hover { color: white; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>✏️ CHỈNH SỬA BÀI HÁT</h2>
        <p style="color: #727272; font-size: 13px; text-align: center; margin-top: -5px; margin-bottom: 25px;">Thay đổi thông tin bài hát hệ thống một cách chính xác</p>
        
        <form th:action="@{/sua-bai-hat}" th:object="${baiHatCanSua}" method="post">
            
            <input type="hidden" th:field="*{maBaiHat}" />
            
            <input type="hidden" th:field="*{trangThaiDuyet}" />

            <div class="form-group">
                <label>Tên bài hát:</label>
                <input type="text" th:field="*{tenBaiHat}" class="form-control" required placeholder="Nhập tên bài hát..." />
            </div>

            <div class="form-group">
                <label>Ca sĩ / Người trình bày:</label>
                <input type="text" th:field="*{nguoiTrinhBay}" class="form-control" required placeholder="Nhập tên ca sĩ..." />
            </div>

            <div class="form-group">
                <label>Đường dẫn YouTube (Link gốc hoặc Mã Video ID):</label>
                <input type="text" th:field="*{linkYoutube}" class="form-control" required placeholder="https://www.youtube.com/watch?v=..." />
            </div>

            <button type="submit" class="btn-submit">Cập nhật thông tin</button>
            <a href="/admin" class="btn-cancel">Hủy bỏ & Quay lại</a>
        </form>
    </div>

</body>
</html>
