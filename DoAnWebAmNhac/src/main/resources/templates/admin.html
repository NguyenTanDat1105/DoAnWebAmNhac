<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Hệ Thống Quản Trị - Muse Zone</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0a0a0f;
            --bg-card: rgba(24, 24, 37, 0.75);
            --bg-card-hover: rgba(32, 32, 50, 0.9);
            --primary: #1DB954;
            --primary-glow: rgba(29, 185, 84, 0.25);
            --text-active: #ffffff;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --danger-glow: rgba(239, 68, 68, 0.25);
        }

        *, *::before, *::after { box-sizing: border-box; }

        body { 
            background-color: var(--bg-main); 
            color: var(--text-active); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; 
            padding: 0; 
            min-height: 100vh;
            /* Đèn nền Neon mờ ảo ẩn sâu phía sau dịu nhẹ */
            background-image: 
                radial-gradient(circle at 15% 15%, rgba(29, 185, 84, 0.06) 0%, transparent 40%),
                radial-gradient(circle at 85% 85%, rgba(99, 102, 241, 0.04) 0%, transparent 45%);
            background-attachment: fixed;
        }

        .admin-container { 
            max-width: 1200px; 
            margin: 60px auto; 
            padding: 0 24px; 
        }

        /* --- THANH TIÊU ĐỀ ĐIỀU HƯỚNG ĐÃ SỬA LỖI --- */
        .header-area { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.06); 
            padding-bottom: 24px; 
            margin-bottom: 40px; 
        }
        
        .title-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .title-icon {
            font-size: 24px;
            background: rgba(29, 185, 84, 0.15);
            padding: 8px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(29, 185, 84, 0.2);
        }

        h1 { 
            margin: 0; 
            font-size: 26px; 
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text-active);
            text-transform: uppercase;
        }

        /* Nút quay về trang chủ phong cách tinh gọn viền mờ */
        .btn-home { 
            background: rgba(255, 255, 255, 0.03); 
            color: var(--text-active); 
            text-decoration: none; 
            padding: 10px 22px; 
            border-radius: 30px; 
            font-size: 13.5px; 
            font-weight: 700; 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1); 
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-home:hover { 
            background: rgba(255, 255, 255, 0.08); 
            border-color: var(--primary);
            box-shadow: 0 0 20px var(--primary-glow);
            transform: translateY(-1px);
        }
        
        /* --- BẢNG QUẢN TRỊ KÍNH MỜ CAO CẤP MỚI --- */
        .table-responsive {
            background: var(--bg-card); 
            border-radius: 20px; 
            overflow: hidden; 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05); 
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
        }

        .admin-table { 
            width: 100%; 
            border-collapse: collapse; 
            text-align: left; 
        }
        
        /* Tiêu đề các mục cột */
        .admin-table th { 
            background: rgba(0, 0, 0, 0.4); 
            color: var(--text-muted); 
            font-size: 12px; 
            font-weight: 700;
            text-transform: uppercase; 
            letter-spacing: 1px; 
            padding: 20px; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        /* Các dòng chứa thông tin dữ liệu */
        .admin-table td { 
            padding: 18px 20px; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.03); 
            font-size: 14.5px; 
            color: #cbd5e1;
            vertical-align: middle;
        }
        
        /* Hiệu ứng di chuột qua từng dòng bừng sáng dịu nhẹ */
        .admin-table tbody tr {
            transition: background-color 0.2s ease;
        }
        .admin-table tbody tr:hover { 
            background-color: rgba(255, 255, 255, 0.02); 
        }
        .admin-table tbody tr:last-child td {
            border-bottom: none;
        }
        
        /* Mã định dạng chuỗi liên kết */
        .video-link-style {
            font-family: monospace;
            color: #64748b; 
            max-width: 180px; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            white-space: nowrap;
        }

        /* --- HỆ THỐNG NÚT HÀNH ĐỘNG CHUẨN SẠCH ĐẸP --- */
        .action-links { 
            display: flex; 
            gap: 10px; 
            justify-content: center;
        }
        
        /* Nút Sửa */
        .btn-edit { 
            background: var(--primary); 
            color: white; 
            text-decoration: none; 
            padding: 8px 18px; 
            border-radius: 20px; 
            font-size: 13px; 
            font-weight: 700; 
            box-shadow: 0 4px 12px var(--primary-glow);
            transition: all 0.2s ease; 
        }
        .btn-edit:hover { 
            background: var(--text-active); 
            color: #000000; 
            box-shadow: 0 6px 20px rgba(255, 255, 255, 0.35);
            transform: translateY(-1px);
        }
        
        /* Nút Xóa */
        .btn-delete { 
            background: rgba(239, 68, 68, 0.15); 
            color: #fca5a5; 
            text-decoration: none; 
            padding: 8px 18px; 
            border-radius: 20px; 
            font-size: 13px; 
            font-weight: 700; 
            border: 1px solid rgba(239, 68, 68, 0.2);
            transition: all 0.2s ease; 
        }
        .btn-delete:hover { 
            background: var(--danger); 
            color: white;
            border-color: var(--danger);
            box-shadow: 0 6px 18px var(--danger-glow);
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <div class="admin-container">
        <div class="header-area">
            <div class="title-wrapper">
                <div class="title-icon">🎛️</div>
                <h1>Hệ Thống Quản Trị Viên</h1>
            </div>
            <a href="/" class="btn-home">⬅ Về Trang Chủ</a>
        </div>
        
        <div class="table-responsive">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th style="width: 8%;">ID</th>
                        <th style="width: 34%;">Tên Bài Hát</th>
                        <th style="width: 25%;">Ca Sĩ / Nghệ Sĩ</th>
                        <th style="width: 15%;">Mã Video Youtube</th>
                        <th style="width: 18%; text-align: center;">Hành Động Quản Lý</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="bh : ${listAdmin}">
                        <td style="color: #64748b; font-weight: 600;" th:text="${bh.maBaiHat}">ID</td>
                        <td style="font-weight: 700; color: var(--text-active);" th:text="${bh.tenBaiHat}">Tên bài hát</td>
                        <td style="font-weight: 500;" th:text="${bh.nguoiTrinhBay}">Ca sĩ</td>
                        <td>
                            <div class="video-link-style" th:text="${bh.linkYoutube}">Link</div>
                        </td>
                        <td>
                            <div class="action-links">
                                <a th:href="@{/sua-bai-hat/{id}(id=${bh.maBaiHat})}" class="btn-edit">Sửa</a>
                                
                                <a th:href="@{/delete/{id}(id=${bh.maBaiHat})}" class="btn-delete" 
                                   onclick="return confirm('⚠️ Bạn có chắc chắn muốn xóa vĩnh viễn bài hát này không?')">Xóa</a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>
