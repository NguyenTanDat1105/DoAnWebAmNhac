<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng Ký Tài Khoản - Muse Zone</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --bg-main: #060609;
            --bg-card: rgba(22, 22, 34, 0.6);
            --bg-card-hover: rgba(30, 30, 47, 0.85);
            --primary: #1DB954;
            --primary-glow: rgba(29, 185, 84, 0.4);
            --accent: #6366f1;
            --text-active: #ffffff;
            --text-muted: #64748b;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body { 
            background-color: var(--bg-main); 
            color: var(--text-active); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 75% 20%, rgba(29, 185, 84, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 25% 80%, rgba(99, 102, 241, 0.06) 0%, transparent 45%);
            background-attachment: fixed;
        }

        .register-container { 
            background-color: var(--bg-card); 
            padding: 40px; 
            border-radius: 24px; 
            width: 420px; 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05); 
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), 0 0 50px rgba(29, 185, 84, 0.02);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .register-container:hover {
            background-color: var(--bg-card-hover);
            border-color: rgba(255, 255, 255, 0.08);
            box-shadow: 0 35px 70px rgba(0, 0, 0, 0.6), 0 0 40px rgba(99, 102, 241, 0.05);
        }

        .brand-logo {
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 800;
            color: var(--primary);
            text-align: center;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        h2 { 
            text-align: center; 
            font-family: 'Syne', sans-serif;
            font-size: 28px;
            font-weight: 700;
            margin: 0 0 25px 0; 
            letter-spacing: -0.5px;
            background: linear-gradient(90deg, #ffffff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-group { margin-bottom: 18px; text-align: left; }
        
        label { 
            display: block; 
            font-size: 13px; 
            font-weight: 600;
            margin-bottom: 8px; 
            color: var(--text-muted); 
            letter-spacing: 0.3px;
        }

        /* --- KHUNG CHỨA Ô MẬT KHẨU ĐĂNG KÝ --- */
        .password-wrapper {
            position: relative;
            width: 100%;
        }

        input, select { 
            width: 100%; 
            padding: 12px 16px; 
            border-radius: 12px; 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            background-color: rgba(0, 0, 0, 0.25); 
            color: white; 
            font-family: inherit;
            font-size: 14px;
            box-sizing: border-box; 
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .password-wrapper input {
            padding-right: 48px;
        }

        input:focus, select:focus { 
            border-color: var(--primary); 
            background-color: rgba(0, 0, 0, 0.45);
            outline: none; 
            box-shadow: 0 0 20px rgba(29, 185, 84, 0.18);
        }
        input::placeholder { color: #475569; }
        select option { background-color: #161622; color: white; }

        /* Icon mắt cho trang đăng ký */
        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 15px;
            transition: color 0.2s;
            user-select: none;
        }
        .toggle-password:hover {
            color: var(--primary);
        }

        .btn-submit { 
            background-color: var(--primary); 
            color: white; 
            font-family: inherit;
            font-weight: 700; 
            width: 100%; 
            padding: 13px; 
            border: none; 
            border-radius: 30px; 
            cursor: pointer; 
            margin-top: 10px; 
            font-size: 15px; 
            letter-spacing: 0.3px;
            box-shadow: 0 4px 15px var(--primary-glow);
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .btn-submit:hover { 
            background-color: var(--text-active); 
            color: var(--bg-main); 
            box-shadow: 0 8px 25px rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
        }

        .msg-error { 
            color: #ef4444; 
            background: rgba(239, 68, 68, 0.06);
            border: 1px dashed rgba(239, 68, 68, 0.25);
            padding: 10px;
            border-radius: 12px;
            font-size: 13.5px; 
            font-weight: 500;
            text-align: center; 
            margin-bottom: 18px; 
        }

        .login-link { 
            text-align: center; 
            margin-top: 22px; 
            font-size: 13.5px; 
            color: var(--text-muted);
            font-weight: 500;
        }
        .login-link a { 
            color: var(--primary); 
            font-weight: 700;
            text-decoration: none; 
            margin-left: 3px;
        }
        .login-link a:hover { 
            color: #1ed760;
            text-decoration: underline; 
        }
    </style>
</head>
<body>

    <div class="register-container">
        <div class="brand-logo">🎵 Muse Zone</div>
        <h2>Tạo Tài Khoản Mới</h2>
        
        <div class="msg-error" th:if="${error}" th:text="${error}">Tên tài khoản đã tồn tại trên hệ thống!</div>

        <form th:action="@{/dang-ky}" th:object="${nguoiDungMoi}" method="post">
            <div class="form-group">
                <label>Tên Đăng Nhập (Tài khoản)</label>
                <input type="text" th:field="*{tenDangNhap}" placeholder="Nhập tài khoản mong muốn..." required />
            </div>
            
            <div class="form-group">
                <label>Mật Khẩu</label>
                <div class="password-wrapper">
                    <input type="password" th:field="*{matKhau}" id="password" placeholder="Tối thiểu 6 ký tự..." required />
                    <i class="fa-regular fa-eye toggle-password" id="togglePassword"></i>
                </div>
            </div>
            
            <div class="form-group">
                <label>Họ Và Tên (Hoặc Nghệ Danh)</label>
                <input type="text" th:field="*{hoTen}" placeholder="Tên hiển thị cộng đồng..." required />
            </div>
            
            <div class="form-group">
			    <label for="phanQuyen">Bạn muốn đăng ký với vai trò:</label>
			    <select th:field="*{phanQuyen}" id="phanQuyen" required>
			        <option value="0">Người Dùng Thường (User)</option>
			        <option value="1">Nghệ Sĩ (Artist)</option>
			    </select>
			</div>
            
            <button type="submit" class="btn-submit">Đăng Ký Ngay</button>
        </form>
        
        <div class="login-link">
            Đã có tài khoản rồi? <a href="/dang-nhap">Đăng nhập</a>
        </div>
    </div>

    <script>
        const togglePassword = document.querySelector('#togglePassword');
        const passwordInput = document.querySelector('#password');

        togglePassword.addEventListener('click', function () {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });
    </script>

</body>
</html>
